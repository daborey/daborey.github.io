<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Computer Telegram</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f172a;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    .box {
        background: #1e293b;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    h1 {
        margin-bottom: 10px;
    }

    p {
        opacity: 0.7;
        margin-bottom: 20px;
    }

    button {
        padding: 14px 25px;
        border: none;
        border-radius: 10px;
        background: #229ED9;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #1b8ec2;
    }
</style>
</head>

<body>

<div class="box">
    <h1>DB Computer</h1>
    <p>Click below to open our Telegram group</p>
    <button onclick="openTelegram()">Open Telegram</button>
</div>

<script>
function openTelegram() {
    const appLink = "tg://resolve?domain=dbcomputer168";
    const webLink = "https://t.me/dbcomputer168";

    // Try open Telegram app
    window.location.href = appLink;

    // If app not installed → open web version
    setTimeout(() => {
        window.location.href = webLink;
    }, 1200);
}
</script>

</body>
</html>
